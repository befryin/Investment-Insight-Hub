version: '3.8'

services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

  finance-tracker:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "7575:80"
    depends_on:
      - api-server
    restart: unless-stopped
